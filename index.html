<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library Tracker</title>
<style>
/* ... Keep your existing CSS ... */
body {
	margin: 0;
	font-family: Arial, sans-serif;
	background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
		url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f')
		no-repeat center center/cover;
	color: #fff;
	min-height: 100vh;
}

.container {
	max-width: 900px;
	margin: 40px auto;
	background: rgba(0, 0, 0, 0.55);
	padding: 20px;
	border-radius: 12px;
	backdrop-filter: blur(12px);
}

h2, h3 {
	text-align: center;
	text-shadow: 0 0 5px rgba(0, 0, 0, 0.8);
}

input {
	width: 95%;
	padding: 10px;
	margin: 8px 0;
	border-radius: 6px;
	border: none;
	display: block;
	background: rgba(255, 255, 255, 0.9);
	color: #000;
}

button {
	width: 100%;
	padding: 10px;
	border: none;
	border-radius: 6px;
	background: #007bff;
	color: #fff;
	cursor: pointer;
	margin-top: 5px;
	transition: 0.3s;
}

button:hover {
	background: #0056b3;
}

.grid {
	display: grid;
	grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
	gap: 15px;
	margin-top: 20px;
}

.card {
	background: rgba(255, 255, 255, 0.15);
	padding: 15px;
	border-radius: 10px;
	cursor: pointer;
	border: 1px solid rgba(255, 255, 255, 0.2);
	transition: 0.3s;
}

.card:hover {
	transform: scale(1.05);
}

.card small {
	opacity: 0.8;
}

.delete {
	color: #ff6b6b;
	cursor: pointer;
}

.details {
	margin-top: 20px;
	padding: 15px;
	background: rgba(255, 255, 255, 0.15);
	border-radius: 10px;
	display: none;
}

.overlay {
	position: fixed;
	top: 0;
	left: 0;
	width: 100%;
	height: 100%;
	background: rgba(0, 0, 0, 0.6);
	display: none;
	justify-content: center;
	align-items: center;
	z-index: 999;
}

.overlay.active {
	display: flex;
}

.loader {
	border: 6px solid #fff;
	border-top: 6px solid #00d4ff;
	border-radius: 50%;
	width: 50px;
	height: 50px;
	animation: spin 1s linear infinite;
}

@
keyframes spin { 100%{
	transform: rotate(360deg);
}
}
</style>
</head>
<body>

	<div class="container" id="app">
		<h2>📚 Library Tracker</h2>
		<button id="showLoginBtn" onclick="showLogin()">Admin Login</button>

		<!-- ADD BOOK -->
		<div id="bookForm" style="display: none;">
			<input type="text" id="bookTitle" placeholder="Book Title"> <input
				type="text" id="bookLanguage" placeholder="Language">
			<button onclick="addBook()">Add Book</button>
		</div>

		<!-- BOOK GRID -->
		<div id="bookGrid" class="grid"></div>

		<!-- DETAILS -->
		<div class="details" id="detailsDiv">
			<h3 id="detailsTitle">Book history</h3>
			<input type="text" id="readerName" placeholder="Reader Name"
				style="display: none;">
			<button onclick="addReader()" id="addReaderBtn"
				style="display: none;">Add Reader</button>
			<ul id="readerList"></ul>
		</div>

		<div id="loginDiv" class="login-container" style="display: none;">
			<h2>Admin Login</h2>
			<input type="text" id="username" placeholder="Username"> <input
				type="password" id="password" placeholder="Password">
			<button onclick="login()">Login</button>
		</div>

	</div>

	<!-- LOADER -->
	<div id="overlay" class="overlay">
		<div class="loader"></div>
	</div>

	<script>
const API = "https://script.google.com/macros/s/AKfycbyPIsPeTuIQJCTEpi71_DNETjiqgPv5Q1P6wHV2kyxuKvoW2qpesozskkrjwp5_24op/exec"; // Replace with your deployed web app URL
let books = [];
let selectedBookIndex = null;
const overlay = document.getElementById("overlay");

function showLoader(){ overlay.classList.add("active"); }
function hideLoader(){ overlay.classList.remove("active"); }

/* ===== FETCH BOOKS ===== */
function renderBooks(){
    showLoader();
    fetch(`${API}?action=getBooks`)
    .then(res => res.json())
    .then(data => {
        books = data.map(b => ({ title:b[0], language:b[1], readers:[] }));
        populateBooks();
    })
    .finally(() => hideLoader());
}

function showLogin(){ 
	document.getElementById("loginDiv").style.display = "block"; 
}

/* ===== LOGIN ===== */
function login(){
    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();
    // simple hardcoded admin check
    if(user==="shri" && pass==="shri"){
        document.getElementById("loginDiv").style.display = "none";
        document.getElementById("app").style.display = "block";
		isAdmin = true;
        renderBooks();
		document.getElementById("bookForm").style.display = "block";
		document.getElementById("readerName").style.display = "inline-block"; 
		document.getElementById("addReaderBtn").style.display = "inline-block";
		alert("Welcome Admin!");
    } else {
        alert("Invalid credentials");
    }
}

/* ===== POPULATE BOOK GRID ===== */
function populateBooks(){
    const grid = document.getElementById("bookGrid");
    grid.innerHTML = "";
    books.forEach((book,index)=>{
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `<strong>${book.title}</strong><br><small>${book.language}</small><br><br>
                         <span class="delete" onclick="event.stopPropagation(); deleteBook(${index})">🗑 Delete</span>`;
        div.onclick = ()=>selectBook(index);
        grid.appendChild(div);
    });
}

/* ===== SELECT BOOK ===== */
function selectBook(index){
    selectedBookIndex = index;
    const book = books[index];
    const detailsDiv = document.getElementById("detailsDiv");
    detailsDiv.style.display = "block";
    document.getElementById("detailsTitle").textContent = `${book.title} (${book.language})`;

    showLoader();
    fetch(`${API}?action=getReaders&title=${encodeURIComponent(book.title)}&language=${encodeURIComponent(book.language)}`)
    .then(res=>res.json())
    .then(data => {
        book.readers = data.map(r => ({ name:r[2], date:r[3] }));
        displayReaders(book);
    })
    .finally(()=>hideLoader());
}

/* ===== DISPLAY READERS ===== */
function displayReaders(book){
    const list = document.getElementById("readerList");
    list.innerHTML = "";
    book.readers.forEach(r => {
        const li = document.createElement("li");
        li.textContent = `${r.name} - ${r.date}`;
        list.appendChild(li);
    });
}

/* ===== ADD BOOK ===== */
function addBook(){
    const title = document.getElementById("bookTitle").value.trim();
    const language = document.getElementById("bookLanguage").value.trim();
    if(!title || !language){ alert("Enter all fields"); return; }

    showLoader();
    fetch(`${API}?action=addBook&title=${encodeURIComponent(title)}&language=${encodeURIComponent(language)}`).then(()=> renderBooks())
      .finally(()=>{
        document.getElementById("bookTitle").value="";
        document.getElementById("bookLanguage").value="";
        hideLoader();
    });
}

/* ===== ADD READER ===== */
function addReader(){
    if(selectedBookIndex===null){ alert("Select a book first"); return; }
    const book = books[selectedBookIndex];
    const reader = document.getElementById("readerName").value.trim();
    if(!reader){ alert("Enter reader name"); return; }

    showLoader();
    fetch(`${API}?action=addReader&title=${encodeURIComponent(book.title)}&language=${encodeURIComponent(book.language)}&reader=${encodeURIComponent(reader)}`).then(()=> selectBook(selectedBookIndex))
      .finally(()=> document.getElementById("readerName").value="");
	hideLoader();
}

/* ===== DELETE BOOK ===== */
function deleteBook(index){
    const book = books[index];
    if(!confirm("Delete this book?")) return;

    showLoader();
    fetch(`${API}?action=deleteBook&title=${encodeURIComponent(book.title)}&language=${encodeURIComponent(book.language)}`).then(()=> renderBooks())
      .finally(()=> hideLoader());
}

/* ===== INIT ===== */
renderBooks();
</script>

</body>
</html>
